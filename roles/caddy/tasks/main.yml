---
- name: Ensure caddy directory exists
  ansible.builtin.file:
    path: "{{ caddy_dir }}"
    state: directory
    owner: "{{ caddy_owner }}"
    mode: "0755"

- name: Check caddy .env exists (cloudflare mode only — holds CF_API_TOKEN)
  ansible.builtin.stat:
    path: "{{ caddy_dir }}/.env"
  register: caddy_env
  when: caddy_tls == 'cloudflare'

- name: Fail if .env is missing (cloudflare mode)
  ansible.builtin.fail:
    msg: >-
      {{ caddy_dir }}/.env not found. Create it on the host with
      CF_API_TOKEN=... — a Cloudflare token with Zone:DNS:Edit on the zone
      (pass show cloudflare/api-token). Caddy needs it for DNS-01.
  when:
    - caddy_tls == 'cloudflare'
    - not caddy_env.stat.exists
    - not ansible_check_mode

- name: Render Dockerfile (Caddy + cloudflare DNS module)
  ansible.builtin.template:
    src: Dockerfile.j2
    dest: "{{ caddy_dir }}/Dockerfile"
    owner: "{{ caddy_owner }}"
    mode: "0644"
  register: caddy_dockerfile

- name: Build the caddy-cloudflare image
  community.docker.docker_image:
    name: "{{ caddy_image }}"
    source: build
    force_source: "{{ caddy_dockerfile is changed }}"
    build:
      path: "{{ caddy_dir }}"
      pull: true
  when: not ansible_check_mode

- name: Render Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ caddy_dir }}/Caddyfile"
    owner: "{{ caddy_owner }}"
    mode: "0644"
  register: caddy_caddyfile
  notify: Reload caddy

- name: Render compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ caddy_dir }}/docker-compose.yml"
    owner: "{{ caddy_owner }}"
    mode: "0644"
  register: caddy_compose

- name: Start caddy
  community.docker.docker_compose_v2:
    project_src: "{{ caddy_dir }}"
    state: present
  # In check mode on a fresh host the project dir was never really created;
  # skip instead of false-failing.
  when: not (ansible_check_mode and caddy_compose is changed)
